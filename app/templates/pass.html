<div class="container-fluid" style="max-width:440px">
    <div class="page-header">
        <h4 class="page-title"><i class="bi bi-key"></i>修改密码</h4>
    </div>
    <div class="card">
        <div class="card-body p-4">
            <div id="msg" class="mb-3"></div>
            <div class="mb-3">
                <label class="form-label fw-500 small text-muted">原密码</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" class="form-control" id="oldPwd" placeholder="请输入原密码">
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label fw-500 small text-muted">新密码</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                    <input type="password" class="form-control" id="newPwd" placeholder="至少6位">
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label fw-500 small text-muted">确认新密码</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-shield-lock"></i></span>
                    <input type="password" class="form-control" id="newPwd2" placeholder="再次输入新密码">
                </div>
            </div>
            <button class="btn btn-primary w-100 py-2" onclick="changePwd()">
                <i class="bi bi-check-lg me-1"></i>确认修改
            </button>
        </div>
    </div>
    <div class="mt-3 small text-muted text-center">
        <i class="bi bi-info-circle me-1"></i>修改密码后请重新登录
    </div>
</div>
<script>
window.changePwd = function() {
    const old = document.getElementById('oldPwd').value;
    const np = document.getElementById('newPwd').value;
    const np2 = document.getElementById('newPwd2').value;
    const msg = document.getElementById('msg');
    if (!old || !np) { msg.innerHTML='<div class="alert alert-warning py-2 small">请填写所有字段</div>'; return; }
    if (np !== np2) { msg.innerHTML='<div class="alert alert-danger py-2 small">两次密码不一致</div>'; return; }
    if (np.length < 6) { msg.innerHTML='<div class="alert alert-warning py-2 small">新密码至少6位</div>'; return; }
    fetch('/api/updatePwd', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({oldPwd:old, newPwd:np}) })
        .then(r=>r.json()).then(resp=>{
            if (resp.success) {
                msg.innerHTML='<div class="alert alert-success py-2 small"><i class="bi bi-check-circle me-1"></i>'+resp.message+'</div>';
                ['oldPwd','newPwd','newPwd2'].forEach(id=>document.getElementById(id).value='');
            } else {
                msg.innerHTML='<div class="alert alert-danger py-2 small">'+resp.message+'</div>';
            }
        });
};
</script>
