<!DOCTYPE html>
<html lang="zh-cn">
<head>
    <meta charset="UTF-8">
    <title>登录</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg,#4b6cb7 0%,#182848 100%); min-height:100vh; display:flex; align-items:center; justify-content:center; }
        .login-card { width:380px; border-radius:1rem; box-shadow:0 10px 30px rgba(0,0,0,.3); }
        .login-header { background:linear-gradient(135deg,#4b6cb7,#182848); color:#fff; border-radius:1rem 1rem 0 0; padding:1.5rem; text-align:center; }
        .captcha-img { cursor:pointer; border-radius:.25rem; height:46px; width:150px; flex-shrink:0; }
    </style>
</head>
<body>
<div class="card login-card">
    <div class="login-header"><h4 class="mb-0">分布式项目管理系统</h4></div>
    <div class="card-body p-4">
        {% if error %}
        <div class="alert alert-danger py-2 small">{{ error }}</div>
        {% endif %}
        <div id="errMsg" class="alert alert-danger py-2 small d-none"></div>
        <div class="mb-3">
            <label class="form-label">用户名</label>
            <input type="text" class="form-control" id="username" placeholder="请输入用户名">
        </div>
        <div class="mb-3">
            <label class="form-label">密码</label>
            <input type="password" class="form-control" id="password" placeholder="请输入密码">
        </div>
        <div class="mb-3">
            <label class="form-label">验证码</label>
            <div class="d-flex gap-2">
                <input type="text" class="form-control" id="captchaCode" placeholder="4位验证码" style="max-width:140px">
                <img src="/api/captcha" class="captcha-img" id="captchaImg" onclick="refreshCaptcha()" title="点击刷新">
            </div>
        </div>
        <button class="btn btn-primary w-100" onclick="doLogin()">登录</button>
    </div>
</div>
<script>
function refreshCaptcha() {
    document.getElementById('captchaImg').src = '/api/captcha?t=' + Date.now();
}
function doLogin() {
    const data = new FormData();
    data.append('username', document.getElementById('username').value);
    data.append('password', document.getElementById('password').value);
    data.append('captchaCode', document.getElementById('captchaCode').value);
    fetch('/api/login', { method:'POST', body:data })
        .then(r => r.json())
        .then(resp => {
            if (resp.success) { window.location.href = '/index'; }
            else {
                const el = document.getElementById('errMsg');
                el.textContent = resp.message;
                el.classList.remove('d-none');
                refreshCaptcha();
            }
        });
}
document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
