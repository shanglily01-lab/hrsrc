<div class="container-fluid">
    <h4 class="mb-3"><i class="bi bi-people me-2"></i>招聘信息</h4>
    <div class="card"><div class="card-body p-0"><div class="table-responsive">
        <table class="table table-hover table-sm align-middle mb-0">
            <thead class="table-light"><tr><th>ID</th><th>用户名</th><th>TG名称</th><th>经验</th><th>邮箱</th><th>类型</th><th>技能</th></tr></thead>
            <tbody>
                {% for d in items %}
                <tr>
                    <td>{{ d.id }}</td>
                    <td>{{ d.uname or '' }}</td>
                    <td>{{ d.tgname or '' }}</td>
                    <td>{{ d.exp or '' }}</td>
                    <td>{{ d.email or '' }}</td>
                    <td>{{ d.utype or '' }}</td>
                    <td style="max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">{{ d.skills or '' }}</td>
                </tr>
                {% else %}
                <tr><td colspan="7" class="text-center text-muted py-3">暂无数据</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div></div></div>
</div>
