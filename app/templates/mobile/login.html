<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>登录</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
<style>
:root { --primary:#0053dc; --bg:#faf8fe; --surface:#fff; --surface-low:#f4f3fa; --on-surface:#30323b; --muted:#5d5f68; --outline:#b0b1bc; }
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--on-surface); min-height:100dvh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px; }
.logo { font-family:'Manrope',sans-serif; font-size:2rem; font-weight:800; color:var(--primary); margin-bottom:6px; }
.subtitle { font-size:.85rem; color:var(--muted); margin-bottom:36px; }
.card { background:var(--surface); border-radius:16px; padding:24px; width:100%; max-width:380px; box-shadow:0 2px 16px rgba(0,83,220,.08); }
.field { margin-bottom:16px; }
.field label { display:block; font-size:.78rem; color:var(--muted); margin-bottom:6px; }
.field input { width:100%; background:var(--surface-low); border:none; border-radius:10px; padding:12px 14px; font-family:'Inter',sans-serif; font-size:.95rem; color:var(--on-surface); }
.field input:focus { outline:2px solid var(--primary); outline-offset:-2px; background:#fff; }
.captcha-row { display:flex; gap:10px; }
.captcha-row input { flex:1; }
.captcha-row img { height:44px; border-radius:8px; cursor:pointer; flex-shrink:0; }
.btn { width:100%; padding:13px; background:var(--primary); color:#fff; border:none; border-radius:10px; font-family:'Inter',sans-serif; font-size:1rem; font-weight:600; cursor:pointer; margin-top:4px; }
.btn:active { background:#0049c2; }
.err { color:#c62828; font-size:.82rem; margin-top:12px; text-align:center; }
</style>
</head>
<body>
<div class="logo">KS HR</div>
<div class="subtitle">人力资源管理系统</div>
<div class="card">
  <form method="post" action="/mobile/login">
    <div class="field">
      <label>用户名</label>
      <input type="text" name="uname" autocomplete="username" placeholder="请输入用户名" required>
    </div>
    <div class="field">
      <label>密码</label>
      <input type="password" name="pwd" autocomplete="current-password" placeholder="请输入密码" required>
    </div>
    <div class="field">
      <label>验证码</label>
      <div class="captcha-row">
        <input type="text" name="captcha" placeholder="验证码" required maxlength="4">
        <img src="/api/captcha" id="cap" onclick="this.src='/api/captcha?t='+Date.now()" alt="验证码">
      </div>
    </div>
    {% if error %}
    <div class="err">{{ error }}</div>
    {% endif %}
    <button type="submit" class="btn">登 录</button>
  </form>
</div>
</body>
</html>
