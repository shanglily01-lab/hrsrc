<div class="container-fluid">
    <div class="page-header">
        <h4 class="page-title"><i class="bi bi-file-earmark-excel"></i>Excel 数据导入</h4>
    </div>

    <div class="row g-4">
        <!-- 薪资导入 -->
        <div class="col-md-6">
            <div class="card h-100">
                <div class="card-header d-flex align-items-center gap-2">
                    <i class="bi bi-currency-exchange text-primary"></i>
                    <div>
                        <div class="fw-500">薪资记录导入</div>
                        <div class="text-muted" style="font-size:.75rem">按薪资导入模板格式批量导入</div>
                    </div>
                </div>
                <div class="card-body">
                    <p class="text-muted small mb-3">
                        <i class="bi bi-info-circle me-1"></i>
                        列格式：序号 / TG名称 / 岗位 / 基本工资 / 绩效工资RMB / 奖金RMB / 应发工资RMB / 时间段 / 备注 / 收款地址TRC20 / 兑换比例 / U数量 / 实际发放数量
                    </p>
                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label class="form-label small text-muted">年份 *</label>
                            <input type="number" class="form-control" id="salaryYear" placeholder="如 2024" min="2020" max="2099">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small text-muted">选择文件</label>
                            <input type="file" class="form-control" id="salaryFile" accept=".xlsx,.xls">
                        </div>
                    </div>
                    <div class="d-flex gap-2 align-items-center">
                        <button class="btn btn-success btn-sm px-4" onclick="importSalary()">
                            <i class="bi bi-upload me-1"></i>开始导入
                        </button>
                        <small class="text-muted">重复导入会追加，不会覆盖</small>
                    </div>
                    <div id="salaryResult" class="mt-3"></div>
                </div>
            </div>
        </div>

        <!-- 资金报表导入 -->
        <div class="col-md-6">
            <div class="card h-100">
                <div class="card-header d-flex align-items-center gap-2">
                    <i class="bi bi-bar-chart text-primary"></i>
                    <div>
                        <div class="fw-500">资金报表导入</div>
                        <div class="text-muted" style="font-size:.75rem">DZ资金报表.xlsx</div>
                    </div>
                </div>
                <div class="card-body">
                    <p class="text-muted small mb-4">
                        <i class="bi bi-info-circle me-1"></i>
                        自动解析所有 Sheet 作为周期数据
                    </p>
                    <div class="mb-4">
                        <label class="form-label small text-muted">选择文件</label>
                        <input type="file" class="form-control" id="fundFile" accept=".xlsx,.xls">
                    </div>
                    <button class="btn btn-success btn-sm px-4" onclick="importFund()">
                        <i class="bi bi-upload me-1"></i>开始导入
                    </button>
                    <div id="fundResult" class="mt-3"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
window.importSalary = function() {
    const year = document.getElementById('salaryYear').value.trim();
    const f = document.getElementById('salaryFile');
    if (!year) { _alert('请填写年份'); return; }
    if (!f.files.length) { _alert('请先选择文件'); return; }
    const fd = new FormData();
    fd.append('file', f.files[0]);
    fd.append('year', year);
    const rd = document.getElementById('salaryResult');
    rd.innerHTML = '<div class="text-muted small"><i class="bi bi-hourglass-split me-1"></i>导入中，请稍候...</div>';
    fetch('/api/finance/import/salary', {method:'POST', body:fd})
        .then(r => r.json())
        .then(resp => {
            if (resp.success) {
                rd.innerHTML = '<div class="alert alert-success p-2 small"><i class="bi bi-check-circle me-1"></i>' + resp.message + '</div>';
                if (resp.data && resp.data.length) {
                    let html = '<div class="mt-2"><table class="table table-sm table-bordered" style="font-size:.75rem"><thead><tr><th>月份</th><th>TG名</th><th>岗位</th><th>时间段</th><th>应发RMB</th><th>实发U</th><th>支付日期</th></tr></thead><tbody>';
                    resp.data.forEach(r => {
                        html += '<tr><td>' + (r.month||'') + '</td><td>' + (r.tg_name||'') + '</td><td>' + (r.position||'') + '</td><td>' + (r.period||'') + '</td><td>' + (r.paid_rmb||'') + '</td><td>' + (r.actual_amount||'') + '</td><td>' + (r.payment_date||'') + '</td></tr>';
                    });
                    html += '</tbody></table></div>';
                    rd.innerHTML += html;
                }
            } else {
                rd.innerHTML = '<div class="alert alert-danger p-2 small"><i class="bi bi-x-circle me-1"></i>导入失败: ' + resp.message + '</div>';
            }
        })
        .catch(e => { rd.innerHTML = '<div class="alert alert-danger p-2 small">请求失败: ' + e + '</div>'; });
};
window.importFund = function() {
    const f = document.getElementById('fundFile');
    if (!f.files.length) { _alert('请先选择文件'); return; }
    const fd = new FormData(); fd.append('file', f.files[0]);
    const rd = document.getElementById('fundResult');
    rd.innerHTML = '<div class="text-muted small"><i class="bi bi-hourglass-split me-1"></i>导入中，请稍候...</div>';
    fetch('/api/finance/import/fund', {method:'POST', body:fd})
        .then(r => r.json())
        .then(resp => {
            rd.innerHTML = resp.success
                ? '<div class="alert alert-success p-2 small"><i class="bi bi-check-circle me-1"></i>' + resp.message + '</div>'
                : '<div class="alert alert-danger p-2 small"><i class="bi bi-x-circle me-1"></i>导入失败: ' + resp.message + '</div>';
        })
        .catch(e => { rd.innerHTML = '<div class="alert alert-danger p-2 small">请求失败: ' + e + '</div>'; });
};
</script>
