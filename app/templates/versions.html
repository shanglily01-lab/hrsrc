<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="mb-0"><i class="bi bi-tags me-2"></i>版本管理
            {% if pro %}<small class="text-muted fs-6">— {{ pro.pname }}</small>{% endif %}
        </h4>
        <div class="d-flex gap-2">
            <button class="btn btn-outline-secondary btn-sm" onclick="loadContent('/pro')">返回项目</button>
            <button class="btn btn-primary btn-sm" onclick="openAdd()"><i class="bi bi-plus-lg me-1"></i>新增版本</button>
        </div>
    </div>

    {% if not versions %}
    <div class="text-center text-muted py-5">暂无版本</div>
    {% else %}
    <div class="row g-3">
        {% for v in versions %}
        <div class="col-md-4 col-lg-3">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-body p-3">
                    <div class="d-flex align-items-center justify-content-between mb-2">
                        <span class="badge bg-primary fs-6">{{ v.vers }}</span>
                        <button class="btn btn-xs btn-outline-danger btn-sm py-0 px-1" onclick="delVersion({{ v.id }})"><i class="bi bi-trash"></i></button>
                    </div>
                    <p class="mb-0 text-muted small" style="white-space:pre-wrap">{{ v.mark or '暂无说明' }}</p>
                </div>
                <div class="card-footer bg-transparent border-0 pt-0 pb-2 px-3">
                    <small class="text-muted"># {{ v.id }}</small>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
    {% endif %}
</div>

<div class="modal fade" id="versionModal" tabindex="-1">
    <div class="modal-dialog"><div class="modal-content">
        <div class="modal-header"><h5 class="modal-title">新增版本</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body">
            <div class="mb-2"><label class="form-label">版本号 *</label><input type="text" class="form-control form-control-sm" id="versionVers" placeholder="如 v1.0.0"></div>
            <div class="mb-2"><label class="form-label">说明</label><textarea class="form-control form-control-sm" id="versionMark" rows="4"></textarea></div>
        </div>
        <div class="modal-footer">
            <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">取消</button>
            <button type="button" class="btn btn-primary btn-sm" onclick="saveVersion()">保存</button>
        </div>
    </div></div>
</div>
<script>
const versionModal = new bootstrap.Modal(document.getElementById('versionModal'));
window.openAdd = function(){document.getElementById('versionVers').value='';document.getElementById('versionMark').value='';versionModal.show();};
window.saveVersion = function(){
    const vers=document.getElementById('versionVers').value.trim();
    if(!vers){_alert('版本号不能为空');return;}
    fetch('/api/version',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pid:{{ pid }},vers:vers,mark:document.getElementById('versionMark').value})})
        .then(r=>r.json()).then(resp=>{if(resp.success){versionModal.hide();loadContent('/version?pid={{ pid }}');}else _alert(resp.message);});
};
window.delVersion=function(id){_confirm('确认删除？', function(){fetch('/api/version/'+id,{method:'DELETE'}).then(r=>r.json()).then(resp=>{if(resp.success)loadContent('/version?pid={{ pid }}');});}, true);};
</script>
