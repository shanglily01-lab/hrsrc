<div class="container-fluid">
    <div class="page-header">
        <h4 class="page-title"><i class="bi bi-shield"></i>角色管理</h4>
        <button class="btn btn-primary btn-sm" onclick="openAdd()"><i class="bi bi-plus-lg me-1"></i>新增角色</button>
    </div>

    {% if not roles %}
    <div class="text-center text-muted py-5">
        <i class="bi bi-shield d-block mb-2 fs-2 opacity-25"></i>暂无角色
    </div>
    {% else %}
    <div class="row g-3">
        {% for r in roles %}
        <div class="col-xl-3 col-lg-4 col-md-6">
            <div class="card h-100" style="border-top:3px solid var(--primary-color) !important">
                <div class="card-body">
                    <div class="d-flex align-items-center gap-3 mb-3">
                        <div class="rounded-circle d-flex align-items-center justify-content-center text-white flex-shrink-0"
                             style="width:42px;height:42px;background:var(--primary-color)">
                            <i class="bi bi-shield-fill"></i>
                        </div>
                        <div class="fw-500">{{ r.rname }}</div>
                    </div>

                    <div class="d-flex gap-2 mt-auto">
                        <button class="btn btn-sm btn-outline-primary flex-fill" onclick="openEdit({{ r.id }}, {{ r.rname | tojson }})">
                            <i class="bi bi-pencil me-1"></i>编辑
                        </button>
                        <button class="btn btn-sm btn-outline-danger" onclick="delRole({{ r.id }})">
                            <i class="bi bi-trash"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
    {% endif %}
</div>

<div class="modal fade" id="roleModal" tabindex="-1">
    <div class="modal-dialog"><div class="modal-content">
        <div class="modal-header border-0 pb-0">
            <h5 class="modal-title" id="roleModalTitle">新增角色</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
            <input type="hidden" id="roleId">
            <label class="form-label small text-muted">角色名称 *</label>
            <input type="text" class="form-control" id="roleName" placeholder="如 管理员、运营、财务">
        </div>
        <div class="modal-footer border-0">
            <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">取消</button>
            <button type="button" class="btn btn-primary btn-sm" onclick="saveRole()"><i class="bi bi-check-lg me-1"></i>保存</button>
        </div>
    </div></div>
</div>
<script>
const roleModal = new bootstrap.Modal(document.getElementById('roleModal'));
window.openAdd = function() {
    document.getElementById('roleModalTitle').textContent = '新增角色';
    document.getElementById('roleId').value = '';
    document.getElementById('roleName').value = '';
    roleModal.show();
};
window.openEdit = function(id, name) {
    document.getElementById('roleModalTitle').textContent = '编辑角色';
    document.getElementById('roleId').value = id;
    document.getElementById('roleName').value = name;
    roleModal.show();
};
window.saveRole = function() {
    const id = document.getElementById('roleId').value;
    const name = document.getElementById('roleName').value;
    if (!name) { _alert('角色名称不能为空'); return; }
    fetch(id ? '/api/role/' + id : '/api/role', { method: id ? 'PUT' : 'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({rname: name}) })
        .then(r => r.json()).then(resp => { if (resp.success) { roleModal.hide(); loadContent('/role'); } else _alert(resp.message); });
};
window.delRole = function(id) {
    _confirm('确认删除？', function() {
        fetch('/api/role/' + id, {method:'DELETE'}).then(r => r.json()).then(resp => { if (resp.success) loadContent('/role'); });
    }, true);
};
</script>
