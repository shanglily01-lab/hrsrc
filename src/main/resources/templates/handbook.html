<!DOCTYPE html>
<html lang="zh-cn" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>员工守则</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        .handbook-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }

        .handbook-card {
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            padding: 30px;
        }

        .handbook-header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
        }

        .handbook-title {
            color: #182848;
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .handbook-subtitle {
            color: #6c757d;
            font-size: 1.1rem;
        }

        .handbook-section {
            margin-bottom: 30px;
        }

        .section-title {
            color: #4b6cb7;
            font-size: 1.5rem;
            font-weight: 500;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #e9ecef;
        }

        .section-content {
            color: #495057;
            line-height: 1.8;
        }

        .section-content ul {
            padding-left: 20px;
        }

        .section-content li {
            margin-bottom: 10px;
        }

        .highlight-box {
            background: #f8f9fa;
            border-left: 4px solid #4b6cb7;
            padding: 15px;
            margin: 15px 0;
            border-radius: 0 5px 5px 0;
        }

        .note {
            font-size: 0.9rem;
            color: #6c757d;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="handbook-container">
        <div class="handbook-card">
            <div class="handbook-header">
                <h1 class="handbook-title">员工守则</h1>
                <p class="handbook-subtitle">愿景与激励：实干、诚信、激励、创造价值与价值共享！</p>
            </div>

            <div class="handbook-section">
                <h2 class="section-title">1. 工作规范</h2>
                <div class="section-content">
                    <ul th:each="item : ${handbooks}" th:if="${item.segid == 0}">
                        <li><p th:text="${item.books}"></p></li>
                    </ul>
                </div>
            </div>

            <div class="handbook-section">
                <h2 class="section-title">2. 行为准则</h2>
                <div class="section-content">
                    <ul th:each="item : ${handbooks}" th:if="${item.segid == 1}">
                        <li><p th:text="${item.books}"></p></li>
                    </ul>
                </div>
            </div>

            <div class="handbook-section">
                <h2 class="section-title">3. 安全规范</h2>
                <div class="section-content">
                    <ul th:each="item : ${handbooks}" th:if="${item.segid == 2}">
                        <li><p th:text="${item.books}"></p></li>
                    </ul>
                </div>
            </div>

            <div class="handbook-section">
                <h2 class="section-title">4. 保密制度</h2>
                <div class="section-content">
                    <div class="highlight-box">
                        <p>员工必须严格遵守保密制度，不得泄露以下信息：</p>
                        <ul th:each="item : ${handbooks}" th:if="${item.segid == 3}">
                            <li><p th:text="${item.books}"></p></li>
                        </ul>
                    </div>
                </div>
            </div>

            <div class="handbook-section">
                <h2 class="section-title">5. 奖惩制度</h2>
                <div class="section-content">
                    <h3>奖励措施：</h3>
                    <ul th:each="item : ${handbooks}" th:if="${item.segid == 4}">
                    <li><p th:text="${item.books}"></p></li>
                    </ul>
                    <h3>处罚措施：</h3>
                    <ul th:each="item : ${handbooks}" th:if="${item.segid == 5}">
                        <li><p th:text="${item.books}"></p></li>
                    </ul>
                </div>
            </div>

            <div class="note">
                <p>注：本守则自发布之日起执行，公司保留最终解释权。分布式员工管理办法@2025</p>
            </div>
        </div>
    </div>
</body>
</html>
