<!DOCTYPE html>
<html lang="zh-cn" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>打卡页面</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #4b6cb7;
            --secondary-color: #182848;
            --success-color: #28a745;
            --danger-color: #dc3545;
            --light-bg: #f8f9fa;
            --card-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15);
            --hover-shadow: 0 0.5rem 2rem rgba(0, 0, 0, 0.2);
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 2rem 0;
        }

        .check-in-section {
            background: white;
            padding: 2.5rem;
            border-radius: 1.5rem;
            margin-bottom: 2rem;
            box-shadow: var(--card-shadow);
            transition: all 0.3s ease;
            animation: slideIn 0.5s ease-out;
        }

        .check-in-section:hover {
            box-shadow: var(--hover-shadow);
            transform: translateY(-5px);
        }

        .check-in-button {
            padding: 1rem 2rem;
            font-size: 1.2rem;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            color: white;
            border: none;
            border-radius: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .check-in-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 255, 255, 0.2),
                transparent
            );
            transition: 0.5s;
        }

        .check-in-button:hover::before {
            left: 100%;
        }

        .check-in-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.2);
        }

        .check-in-button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .check-in-button:disabled::before {
            display: none;
        }

        .history-section {
            background: white;
            padding: 2.5rem;
            border-radius: 1.5rem;
            box-shadow: var(--card-shadow);
            transition: all 0.3s ease;
            animation: slideIn 0.5s ease-out 0.2s backwards;
        }

        .history-section:hover {
            box-shadow: var(--hover-shadow);
        }

        .history-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
        }

        .history-table th {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            color: white;
            padding: 1rem;
            font-weight: 500;
        }

        .history-table th:first-child {
            border-top-left-radius: 1rem;
        }

        .history-table th:last-child {
            border-top-right-radius: 1rem;
        }

        .history-table td {
            padding: 1rem;
            border-bottom: 1px solid #eee;
            transition: all 0.3s ease;
        }

        .history-table tr:hover td {
            background-color: rgba(75, 108, 183, 0.05);
        }

        .toast {
            background: white;
            border-radius: 1rem;
            box-shadow: var(--card-shadow);
        }

        .toast.bg-success {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%) !important;
        }

        .toast.bg-danger {
            background: linear-gradient(135deg, #dc3545 0%, #c82333 100%) !important;
        }

        .welcome-text {
            font-size: 2rem;
            font-weight: 600;
            color: var(--secondary-color);
            margin-bottom: 0.5rem;
        }

        .welcome-text span {
            color: var(--primary-color);
        }

        .current-time {
            font-size: 1.1rem;
            color: #6c757d;
            margin-bottom: 1rem;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
            100% {
                transform: scale(1);
            }
        }

        .check-in-button:not(:disabled) {
            animation: pulse 2s infinite;
        }

        .table-responsive {
            border-radius: 1rem;
            overflow: hidden;
        }

        .history-section h4 {
            color: var(--secondary-color);
            font-weight: 600;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .history-section h4::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 24px;
            background: linear-gradient(to bottom, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
        }
    </style>
</head>
<body>
    <div class="container mt-4">
        <!-- Toast 提示框 -->
        <div class="position-fixed bottom-0 end-0 p-3" style="z-index: 11">
            <div id="toast" class="toast" role="alert" aria-live="assertive" aria-atomic="true">
                <div class="toast-header">
                    <i class="bi bi-info-circle me-2"></i>
                    <strong class="me-auto">系统提示</strong>
                    <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
                </div>
                <div class="toast-body"></div>
            </div>
        </div>

        <!-- 上部分：用户信息和打卡按钮 -->
        <div class="check-in-section">
            <div class="row align-items-center">
                <div class="col-md-6">
                    <h3 class="welcome-text">欢迎, <span th:text="${User.uname}">用户名</span></h3>
                    <p class="current-time" id="currentTime"></p>
                    <input type="hidden" id="uid" th:value="${User.id}"/>
                </div>
                <div class="col-md-6 text-end">
                    <button class="check-in-button me-2" id="checkInBtn" onclick="checkIn('AM')" disabled>
                        <i class="bi bi-sunrise me-2"></i>上班打卡
                    </button>
                    <button class="check-in-button" id="checkOutBtn" onclick="checkIn('PM')" disabled>
                        <i class="bi bi-sunset me-2"></i>下班打卡
                    </button>
                </div>
            </div>
        </div>

        <!-- 下部分：打卡历史记录 -->
        <div class="history-section">
            <h4>打卡记录</h4>
            <div class="table-responsive">
                <table class="table table-hover history-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>用户名</th>
                            <th>AM|PM</th>
                            <th>打卡时间</th>
                        </tr>
                    </thead>
                    <tbody id="checkInHistory">
                        <tr th:each="record : ${Cards}">
                            <td th:text="${record.id}"></td>
                            <td th:text="${record.uname}"></td>
                            <td th:text="${record.ampm}"></td>
                            <td th:text="${record.hinttime}"></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // 打卡功能
        window.checkIn=function(type) {
            const button = type === 'AM' ? document.getElementById('checkInBtn') : document.getElementById('checkOutBtn');
            button.disabled = true;
            
            const now = new Date();
            const uid = document.getElementById('uid').value;
            
            const hintCard = {
                uname: document.querySelector('h3 span').textContent,
                ampm: type,
                uid: uid
            };
            
            fetch('/api/insertHintCard', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(hintCard)
            })
            .then(response => {
                if(!response.ok){
                    throw new Error('打卡失败');
                }
                return response.json();
            })
            .then(data => {
                showToast(type === 'AM' ? '上班打卡成功！' : '下班打卡成功！');
                // 保持按钮禁用状态
                button.disabled=true;

                // 刷新打卡记录
                refreshCheckInRecords();
            })
            .catch(error => {
                console.error('Error:', error);
                showToast('打卡失败，请稍后重试', false);
                button.disabled = false;
            });
        }

        // 显示提示信息
        window.showToast=function(message, isSuccess = true) {
            const toast = document.getElementById('toast');
            const toastBody = toast.querySelector('.toast-body');
            const toastHeader = toast.querySelector('.toast-header');
            
            // 设置提示框样式
            toast.classList.remove('bg-success', 'bg-danger', 'text-white');
            if (isSuccess) {
                toast.classList.add('bg-success', 'text-white');
                toastHeader.innerHTML = '<i class="bi bi-check-circle me-2"></i><strong class="me-auto">成功</strong>';
            } else {
                toast.classList.add('bg-danger', 'text-white');
                toastHeader.innerHTML = '<i class="bi bi-exclamation-circle me-2"></i><strong class="me-auto">错误</strong>';
            }
            
            toastBody.textContent = message;
            const bsToast = new bootstrap.Toast(toast);
            bsToast.show();
        }

        // 刷新打卡记录
         window.refreshCheckInRecords=function() {
            fetch('/api/findHintCard')
                .then(response => response.json())
                .then(data => {
                    const tbody = document.getElementById('checkInHistory');
                    tbody.innerHTML = '';
                    data.forEach(record => {
                        const row = document.createElement('tr');
                        row.innerHTML = `
                            <td>${record.id}</td>
                            <td>${record.uname}</td>
                            <td>${record.ampm}</td>
                            <td>${record.hinttime}</td>
                        `;
                        tbody.appendChild(row);
                    });
                })
                .catch(error => console.error('Error:', error));
        }

        // 更新时间显示和按钮状态
        function updateTime() {
            const now = new Date();
            const hours = now.getHours();
            
            // 更新时间显示
            const currentTimeElement = document.getElementById('currentTime');
            if (currentTimeElement) {
                currentTimeElement.textContent = 
                    now.toLocaleString('zh-CN', { 
                        year: 'numeric', 
                        month: '2-digit', 
                        day: '2-digit',
                        hour: '2-digit',
                        minute: '2-digit',
                        second: '2-digit',
                        hour12: false
                    });
            }

            // 更新按钮状态
            const checkInBtn = document.getElementById('checkInBtn');
            const checkOutBtn = document.getElementById('checkOutBtn');
            if (checkInBtn) {
                checkInBtn.disabled = !(hours >= 8 && hours < 12);
            }
            if (checkOutBtn) {
                checkOutBtn.disabled = !(hours >= 18 && hours < 23);
            }
        }

        // 立即执行一次
        updateTime();
        // 每秒更新一次
        setInterval(updateTime, 1000);
    </script>
</body>
</html>
