<!DOCTYPE html>
<html lang="zh-cn" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>修改密码</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        .password-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }

        .password-card {
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            padding: 30px;
        }

        .password-header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
        }

        .password-title {
            color: #182848;
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .password-subtitle {
            color: #6c757d;
            font-size: 1rem;
        }

        .form-label {
            font-weight: 500;
            color: #495057;
        }

        .form-control {
            border-radius: 5px;
            border: 1px solid #ced4da;
            padding: 10px 15px;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: #4b6cb7;
            box-shadow: 0 0 0 0.2rem rgba(75, 108, 183, 0.25);
        }

        .password-strength {
            height: 5px;
            margin-top: 5px;
            border-radius: 3px;
            transition: all 0.3s ease;
        }

        .strength-weak {
            background-color: #dc3545;
            width: 33%;
        }

        .strength-medium {
            background-color: #ffc107;
            width: 66%;
        }

        .strength-strong {
            background-color: #28a745;
            width: 100%;
        }

        .btn-submit {
            background: linear-gradient(135deg, #4b6cb7 0%, #182848 100%);
            color: white;
            border: none;
            padding: 10px 30px;
            border-radius: 5px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .btn-submit:hover {
            background: linear-gradient(135deg, #5a7bc7 0%, #2a3858 100%);
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
            color: white;
        }

        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1050;
        }

        .password-requirements {
            font-size: 0.875rem;
            color: #6c757d;
            margin-top: 5px;
        }

        .requirement {
            display: flex;
            align-items: center;
            gap: 5px;
            margin-bottom: 3px;
        }

        .requirement i {
            font-size: 0.75rem;
        }

        .requirement.valid {
            color: #28a745;
        }

        .requirement.invalid {
            color: #dc3545;
        }
    </style>
</head>
<body>
    <div class="password-container">
        <div class="password-card">
            <div class="password-header">
                <h1 class="password-title">修改密码</h1>
                <p class="password-subtitle">Change Password</p>
            </div>

            <form id="passwordForm" class="needs-validation" novalidate>
                <div class="mb-4">
                    <label class="form-label">当前用户</label>
                    <div class="form-control bg-light" th:text="${session.user.uname}">用户名</div>
                </div>

                <div class="mb-4">
                    <label for="newPassword" class="form-label">新密码</label>
                    <input type="password" class="form-control" id="newPassword" required
                           minlength="8" maxlength="20">
                    <div class="password-strength"></div>
                    <div class="password-requirements">
                        <div class="requirement" data-requirement="length">
                            <i class="bi bi-circle"></i>
                            <span>密码长度至少8位</span>
                        </div>
                        <div class="requirement" data-requirement="uppercase">
                            <i class="bi bi-circle"></i>
                            <span>包含大写字母</span>
                        </div>
                        <div class="requirement" data-requirement="lowercase">
                            <i class="bi bi-circle"></i>
                            <span>包含小写字母</span>
                        </div>
                        <div class="requirement" data-requirement="number">
                            <i class="bi bi-circle"></i>
                            <span>包含数字</span>
                        </div>
                        <div class="requirement" data-requirement="special">
                            <i class="bi bi-circle"></i>
                            <span>包含特殊字符</span>
                        </div>
                    </div>
                </div>

                <div class="mb-4">
                    <label for="confirmPassword" class="form-label">确认新密码</label>
                    <input type="password" class="form-control" id="confirmPassword" required>
                    <div class="invalid-feedback">两次输入的密码不一致</div>
                </div>

                <div class="text-center">
                    <button type="submit" class="btn btn-submit">
                        <i class="bi bi-check-circle me-2"></i>确认修改
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Toast提示 -->
    <div class="toast align-items-center text-white bg-success border-0" role="alert" aria-live="assertive" aria-atomic="true">
        <div class="d-flex">
            <div class="toast-body">
                密码修改成功！
            </div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const toast = new bootstrap.Toast(document.querySelector('.toast'));
        const form = document.getElementById('passwordForm');
        const newPassword = document.getElementById('newPassword');
        const confirmPassword = document.getElementById('confirmPassword');
        const strengthBar = document.querySelector('.password-strength');
        const requirements = document.querySelectorAll('.requirement');

        // 密码强度检查
        function checkPasswordStrength(password) {
            let strength = 0;
            
            // 长度检查
            if (password.length >= 8) {
                strength += 1;
                updateRequirement('length', true);
            } else {
                updateRequirement('length', false);
            }

            // 大写字母检查
            if (/[A-Z]/.test(password)) {
                strength += 1;
                updateRequirement('uppercase', true);
            } else {
                updateRequirement('uppercase', false);
            }

            // 小写字母检查
            if (/[a-z]/.test(password)) {
                strength += 1;
                updateRequirement('lowercase', true);
            } else {
                updateRequirement('lowercase', false);
            }

            // 数字检查
            if (/[0-9]/.test(password)) {
                strength += 1;
                updateRequirement('number', true);
            } else {
                updateRequirement('number', false);
            }

            // 特殊字符检查
            if (/[^A-Za-z0-9]/.test(password)) {
                strength += 1;
                updateRequirement('special', true);
            } else {
                updateRequirement('special', false);
            }

            // 更新强度条
            strengthBar.className = 'password-strength';
            if (strength <= 2) {
                strengthBar.classList.add('strength-weak');
            } else if (strength <= 4) {
                strengthBar.classList.add('strength-medium');
            } else {
                strengthBar.classList.add('strength-strong');
            }
        }

        // 更新要求状态
        function updateRequirement(type, valid) {
            const requirement = document.querySelector(`[data-requirement="${type}"]`);
            requirement.className = `requirement ${valid ? 'valid' : 'invalid'}`;
            requirement.querySelector('i').className = `bi ${valid ? 'bi-check-circle-fill' : 'bi-circle'}`;
        }

        // 监听密码输入
        newPassword.addEventListener('input', function() {
            checkPasswordStrength(this.value);
            if (confirmPassword.value) {
                confirmPassword.setCustomValidity(
                    this.value === confirmPassword.value ? '' : '两次输入的密码不一致'
                );
            }
        });

        // 监听确认密码输入
        confirmPassword.addEventListener('input', function() {
            this.setCustomValidity(
                this.value === newPassword.value ? '' : '两次输入的密码不一致'
            );
        });

        // 表单提交
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            if (!form.checkValidity()) {
                e.stopPropagation();
                form.classList.add('was-validated');
                return;
            }

            // 发送请求
            fetch('/api/updatePwd', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                },
                body: `npd=${encodeURIComponent(newPassword.value)}`
            })
            .then(response => response.text())
            .then(data => {
                if (data === '1') {
                    // 显示成功提示
                    document.querySelector('.toast').classList.remove('bg-danger');
                    document.querySelector('.toast').classList.add('bg-success');
                    document.querySelector('.toast-body').textContent = '密码修改成功！';
                    toast.show();
                    
                    // 清空表单
                    form.reset();
                    form.classList.remove('was-validated');
                    strengthBar.className = 'password-strength';
                    requirements.forEach(req => {
                        req.className = 'requirement';
                        req.querySelector('i').className = 'bi bi-circle';
                    });

                    // 延迟1秒后关闭页面
                    setTimeout(() => {
                        // 如果是在模态框中，关闭模态框
                        const modal = document.querySelector('.modal');
                        if (modal) {
                            const modalInstance = bootstrap.Modal.getInstance(modal);
                            if (modalInstance) {
                                modalInstance.hide();
                            }
                        } else {
                            // 如果不是在模态框中，返回上一页
                            window.history.back();
                        }
                    }, 1000);
                } else {
                    // 显示错误提示
                    document.querySelector('.toast').classList.remove('bg-success');
                    document.querySelector('.toast').classList.add('bg-danger');
                    document.querySelector('.toast-body').textContent = '密码修改失败！';
                    toast.show();
                }
            })
            .catch(error => {
                console.error('Error:', error);
                document.querySelector('.toast').classList.remove('bg-success');
                document.querySelector('.toast').classList.add('bg-danger');
                document.querySelector('.toast-body').textContent = '系统错误，请稍后重试！';
                toast.show();
            });
        });
    </script>
</body>
</html>
