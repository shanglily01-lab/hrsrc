<!DOCTYPE html>
<html lang="zh-cn" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>打卡记录</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #4b6cb7;
            --secondary-color: #182848;
            --light-bg: #f8f9fa;
            --card-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15);
            --hover-shadow: 0 0.5rem 2rem rgba(0, 0, 0, 0.2);
        }

        .history-section {
            background: white;
            padding: 2.5rem;
            border-radius: 1.5rem;
            box-shadow: var(--card-shadow);
            transition: all 0.3s ease;
            animation: slideIn 0.5s ease-out;
        }

        .history-section:hover {
            box-shadow: var(--hover-shadow);
        }

        .history-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
        }

        .history-table th {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            color: white;
            padding: 1rem;
            font-weight: 500;
        }

        .history-table th:first-child {
            border-top-left-radius: 1rem;
        }

        .history-table th:last-child {
            border-top-right-radius: 1rem;
        }

        .history-table td {
            padding: 1rem;
            border-bottom: 1px solid #eee;
            transition: all 0.3s ease;
        }

        .history-table tr:hover td {
            background-color: rgba(75, 108, 183, 0.05);
        }

        .table-responsive {
            border-radius: 1rem;
            overflow: hidden;
        }

        .history-section h4 {
            color: var(--secondary-color);
            font-weight: 600;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .history-section h4::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 24px;
            background: linear-gradient(to bottom, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="container mt-4">
        <!-- 打卡记录部分 -->
        <div class="history-section">
            <h4><i class="bi bi-clock-history"></i>打卡记录</h4>
            <div class="table-responsive">
                <table class="table table-hover history-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>用户名</th>
                            <th>AM|PM</th>
                            <th>打卡时间</th>
                        </tr>
                    </thead>
                    <tbody id="checkInHistory">
                        <tr th:each="record : ${Cards}">
                            <td th:text="${record.id}"></td>
                            <td th:text="${record.uname}"></td>
                            <td th:text="${record.ampm}"></td>
                            <td th:text="${record.hinttime}"></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    
</body>
</html>
