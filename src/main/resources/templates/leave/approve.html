<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>请假审批</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css">
    <style>
        .badge { font-size: 0.9em; padding: 0.5em 0.8em; }
        .table th { background-color: #f8f9fa; }
    </style>
</head>
<body>
<div class="container mt-4">
    <div class="row mb-3">
        <div class="col">
            <h2>请假审批</h2>
        </div>
    </div>

    <div class="table-responsive">
        <table class="table table-striped">
            <thead>
            <tr>
                <th>申请人</th>
                <th>请假类型</th>
                <th>开始时间</th>
                <th>结束时间</th>
                <th>天数</th>
                <th>状态</th>
                <th>申请时间</th>
                <th>操作</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="la : ${applications}">
                <td th:text="${la.employee_name}">-</td>
                <td>
                    <span th:switch="${la.leave_type}">
                        <span th:case="'ANNUAL'">年假</span>
                        <span th:case="'SICK'">病假</span>
                        <span th:case="'PERSONAL'">事假</span>
                        <span th:case="'MARRIAGE'">婚假</span>
                        <span th:case="'MATERNITY'">产假</span>
                        <span th:case="'OTHER'">其他</span>
                        <span th:case="*">-</span>
                    </span>
                </td>
                <td th:text="${#dates.format(la.start_date, 'yyyy-MM-dd')}">-</td>
                <td th:text="${#dates.format(la.end_date, 'yyyy-MM-dd')}">-</td>
                <td th:text="${la.duration}">-</td>
                <td>
                    <span th:switch="${la.status}">
                        <span th:case="'PENDING'" class="badge bg-warning">待审批</span>
                        <span th:case="'APPROVED'" class="badge bg-success">已批准</span>
                        <span th:case="'REJECTED'" class="badge bg-danger">已拒绝</span>
                        <span th:case="'CANCELLED'" class="badge bg-secondary">已取消</span>
                        <span th:case="*" class="badge bg-secondary">未知</span>
                    </span>
                </td>
                <td th:text="${#dates.format(la.created_at, 'yyyy-MM-dd')}">-</td>
                <td>
                    <div class="btn-group">
                        <button class="btn btn-sm btn-info" th:onclick="'viewApplication(' + ${la.id} + ')'">查看</button>
                        <button class="btn btn-sm btn-success" 
                                th:if="${la.status == 'PENDING'}"
                                th:onclick="'approveApplication(' + ${la.id} + ')'">批准</button>
                        <button class="btn btn-sm btn-danger" 
                                th:if="${la.status == 'PENDING'}"
                                th:onclick="'rejectApplication(' + ${la.id} + ')'">拒绝</button>
                    </div>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(applications)}">
                <td colspan="8" class="text-center">暂无请假申请</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<!-- 查看请假详情模态框 -->
<div class="modal fade" id="viewLeaveModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">请假详情</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="row">
                    <div class="col-md-6">
                        <p><strong>申请人：</strong><span id="viewEmployeeName"></span></p>
                        <p><strong>请假类型：</strong><span id="viewLeaveType"></span></p>
                        <p><strong>开始时间：</strong><span id="viewStartDate"></span></p>
                        <p><strong>结束时间：</strong><span id="viewEndDate"></span></p>
                        <p><strong>请假天数：</strong><span id="viewDuration"></span></p>
                    </div>
                    <div class="col-md-6">
                        <p><strong>状态：</strong><span id="viewStatus"></span></p>
                        <p><strong>审批人：</strong><span id="viewApprover"></span></p>
                        <p><strong>审批时间：</strong><span id="viewApprovalTime"></span></p>
                        <p><strong>审批意见：</strong><span id="viewApprovalComment"></span></p>
                    </div>
                </div>
                <div class="row mt-3">
                    <div class="col-12">
                        <p><strong>请假原因：</strong></p>
                        <p id="viewReason" class="border p-2 rounded"></p>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
            </div>
        </div>
    </div>
</div>

<!-- 审批意见模态框 -->
<div class="modal fade" id="approvalModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="approvalModalLabel">审批意见</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="approvalForm">
                    <input type="hidden" id="applicationId">
                    <input type="hidden" id="approvalType">
                    <div class="mb-3">
                        <label for="approvalComment" class="form-label">审批意见</label>
                        <textarea class="form-control" id="approvalComment" rows="3" required></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" onclick="submitApproval()">提交</button>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
// 全局函数定义
window.viewApplication = function(id) {
    if (!id) {
        showAlert('错误', '无效的请假记录ID', 'error');
        return;
    }
    
    // 真实API调用获取请假详情
    if (typeof $ !== 'undefined' && $.ajax) {
        $.ajax({
            url: '/api/leave-applications/' + id,
            type: 'GET',
            success: function(response) {
                handleViewSuccess(response);
            },
            error: function(xhr) {
                showAlert('错误', xhr.responseJSON?.message || '获取请假详情失败', 'error');
            }
        });
    } else {
        fetch('/api/leave-applications/' + id)
            .then(response => response.json())
            .then(data => {
                handleViewSuccess(data);
            })
            .catch(error => {
                showAlert('错误', '获取请假详情失败', 'error');
            });
    }
};

window.approveApplication = function(id) {
    if (!id) {
        showAlert('错误', '无效的请假记录ID', 'error');
        return;
    }
    
    document.getElementById('applicationId').value = id;
    document.getElementById('approvalType').value = 'approve';
    document.getElementById('approvalModalLabel').textContent = '批准请假申请';
    
    showModal('approvalModal');
};

window.rejectApplication = function(id) {
    if (!id) {
        showAlert('错误', '无效的请假记录ID', 'error');
        return;
    }
    
    document.getElementById('applicationId').value = id;
    document.getElementById('approvalType').value = 'reject';
    document.getElementById('approvalModalLabel').textContent = '拒绝请假申请';
    
    showModal('approvalModal');
};

window.submitApproval = function() {
    const applicationId = document.getElementById('applicationId').value;
    const approvalType = document.getElementById('approvalType').value;
    const approvalComment = document.getElementById('approvalComment').value;
    
    if (!applicationId || !approvalType || !approvalComment.trim()) {
        showAlert('提示', '请填写完整的审批信息', 'warning');
        return;
    }
    
    // 获取当前用户信息（从session或页面中获取）
    const approverId = 1; // 这里需要根据实际情况获取审批人ID
    const approverName = '管理员'; // 这里需要根据实际情况获取审批人姓名
    
    const data = {
        approverId: approverId,
        approverName: approverName,
        comment: approvalComment.trim()
    };
    
    const url = approvalType === 'approve' 
        ? `/api/leave-applications/${applicationId}/approve`
        : `/api/leave-applications/${applicationId}/reject`;
    
    // 真实API调用
    if (typeof $ !== 'undefined' && $.ajax) {
        $.ajax({
            url: url,
            type: 'PUT',
            contentType: 'application/json',
            data: JSON.stringify(data),
            success: function(response) {
                handleApprovalSuccess(response);
            },
            error: function(xhr) {
                showAlert('错误', xhr.responseJSON?.message || '审批失败', 'error');
            }
        });
    } else {
        fetch(url, {
            method: 'PUT',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify(data)
        })
        .then(response => response.json())
        .then(data => {
            handleApprovalSuccess(data);
        })
        .catch(error => {
            showAlert('错误', '审批失败', 'error');
        });
    }
};

// 辅助函数
function showAlert(title, message, type = 'info') {
    const alertDiv = document.createElement('div');
    alertDiv.style.cssText = `
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: white;
        border-radius: 8px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        padding: 20px;
        min-width: 300px;
        max-width: 400px;
        z-index: 10000;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    `;
    
    let color = '#007bff';
    if (type === 'error') color = '#dc3545';
    if (type === 'warning') color = '#ffc107';
    if (type === 'success') color = '#28a745';
    
    alertDiv.innerHTML = `
        <div style="display: flex; align-items: center; margin-bottom: 15px;">
            <div style="width: 20px; height: 20px; border-radius: 50%; background: ${color}; margin-right: 10px;"></div>
            <h3 style="margin: 0; color: #333; font-size: 18px;">${title}</h3>
        </div>
        <p style="margin: 0 0 20px 0; color: #666; line-height: 1.5;">${message}</p>
        <button onclick="this.parentElement.remove()" style="
            background: ${color};
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            float: right;
        ">确定</button>
        <div style="clear: both;"></div>
    `;
    
    const backdrop = document.createElement('div');
    backdrop.style.cssText = `
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.5);
        z-index: 9999;
    `;
    backdrop.onclick = function() {
        backdrop.remove();
        alertDiv.remove();
    };
    
    document.body.appendChild(backdrop);
    document.body.appendChild(alertDiv);
};

function showModal(modalId) {
    const modalElement = document.getElementById(modalId);
    if (modalElement && typeof bootstrap !== 'undefined') {
        const modal = new bootstrap.Modal(modalElement);
        modal.show();
    } else if (typeof $ !== 'undefined' && $.fn.modal) {
        $('#' + modalId).modal('show');
    }
}

function hideModal(modalId) {
    const modalElement = document.getElementById(modalId);
    if (modalElement && typeof bootstrap !== 'undefined') {
        const modal = bootstrap.Modal.getInstance(modalElement);
        if (modal) {
            modal.hide();
        }
    } else if (typeof $ !== 'undefined' && $.fn.modal) {
        $('#' + modalId).modal('hide');
    }
}

// 刷新审批列表
function refreshApprovalList() {
    // 如果是在主页面的iframe中加载，则重新加载当前页面内容
    if (window.parent && window.parent !== window) {
        // 在iframe中，重新加载审批页面内容
        window.parent.loadContent('/leave/approve');
    } else {
        // 直接访问审批页面，刷新整个页面
        location.reload();
    }
}

function handleViewSuccess(response) {
    if (response && response.success) {
        const data = response.data;
        
        const leaveTypeMap = {
            'ANNUAL': '年假',
            'SICK': '病假',
            'PERSONAL': '事假',
            'MARRIAGE': '婚假',
            'MATERNITY': '产假',
            'OTHER': '其他'
        };
        
        const statusMap = {
            'PENDING': '<span class="badge bg-warning">待审批</span>',
            'APPROVED': '<span class="badge bg-success">已批准</span>',
            'REJECTED': '<span class="badge bg-danger">已拒绝</span>',
            'CANCELLED': '<span class="badge bg-secondary">已取消</span>'
        };
        
        document.getElementById('viewEmployeeName').textContent = data.employee_name || '-';
        document.getElementById('viewLeaveType').textContent = leaveTypeMap[data.leave_type] || '-';
        document.getElementById('viewStartDate').textContent = data.start_date ? data.start_date.split(' ')[0] : '-';
        document.getElementById('viewEndDate').textContent = data.end_date ? data.end_date.split(' ')[0] : '-';
        document.getElementById('viewDuration').textContent = data.duration || '-';
        document.getElementById('viewStatus').innerHTML = statusMap[data.status] || '-';
        document.getElementById('viewApprover').textContent = data.approver_name || '-';
        document.getElementById('viewApprovalTime').textContent = data.approval_time ? data.approval_time.split(' ')[0] : '-';
        document.getElementById('viewApprovalComment').textContent = data.approval_comment || '-';
        document.getElementById('viewReason').textContent = data.reason || '-';
        
        showModal('viewLeaveModal');
    } else {
        showAlert('错误', response.message || '获取请假详情失败', 'error');
    }
}

// 处理审批成功的响应
function handleApprovalSuccess(response) {
    if (response && response.success) {
        // 关闭审批意见模态框
        hideModal('approvalModal');
        
        // 重置表单
        document.getElementById('approvalForm').reset();
        
        // 显示成功消息
        showAlert('成功', '审批操作已完成', 'success');
        
        // 只刷新审批列表，不关闭整个审批页面
        setTimeout(() => {
            refreshApprovalList();
        }, 1000);
    } else {
        showAlert('错误', response.message || '审批失败', 'error');
    }
}
</script>
</body>
</html>
