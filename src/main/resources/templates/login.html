<!DOCTYPE html>
<html lang="zh-cn" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 分布式项目管理系统[DSP]</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11.7.32/dist/sweetalert2.min.css">
    <style>
        :root {
            --primary-color: #4b6cb7;
            --primary-dark: #182848;
            --text-light: #ffffff;
        }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            margin: 0;
            padding: 0;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 2rem;
            background: white;
            border-radius: 1.5rem;
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15);
            animation: slideIn 0.5s ease-out;
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-header i {
            font-size: 3rem;
            color: var(--primary-color);
            margin-bottom: 1rem;
        }

        .login-header h1 {
            font-size: 1.8rem;
            color: var(--primary-dark);
            margin: 0;
        }

        .form-group {
            margin-bottom: 1.5rem;
            position: relative;
        }

        .form-control {
            padding: 0.75rem 1rem;
            border-radius: 0.75rem;
            border: 2px solid #e9ecef;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 0.2rem rgba(75, 108, 183, 0.25);
        }

        .form-group i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #6c757d;
        }

        .form-control {
            padding-left: 2.5rem;
        }

        .btn-login {
            width: 100%;
            padding: 0.75rem;
            border-radius: 0.75rem;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-dark) 100%);
            color: var(--text-light);
            border: none;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.2);
        }

        .captcha-container {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .captcha-input {
            flex: 1;
        }

        .captcha-image {
            height: 38px;
            border-radius: 0.75rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .captcha-image:hover {
            transform: scale(1.05);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .error-message {
            color: #dc3545;
            font-size: 0.875rem;
            margin-top: 0.5rem;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <i class="bi bi-stack"></i>
            <h1>分布式项目管理系统[DSP]</h1>
        </div>
        <form id="loginForm" onsubmit="return handleLogin(event)">
            <div class="form-group">
                <i class="bi bi-person"></i>
                <input type="text" class="form-control" id="username" name="username" placeholder="用户名" required>
            </div>
            <div class="form-group">
                <i class="bi bi-lock"></i>
                <input type="password" class="form-control" id="password" name="password" placeholder="密码" required>
            </div>
            <div class="form-group">
                <div class="captcha-container">
                    <div class="captcha-input">
                        <i class="bi bi-shield-lock"></i>
                        <input type="text" class="form-control" id="captcha" name="captcha" placeholder="验证码" required>
                    </div>
                    <img id="captchaImage" class="captcha-image" src="/api/captcha" alt="验证码" onclick="refreshCaptcha()" style="cursor: pointer;">
                </div>
                <div class="error-message" id="captchaError">验证码错误</div>
            </div>
            <button type="submit" class="btn btn-login">登录</button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.7.32/dist/sweetalert2.all.min.js"></script>
    <script>
        function refreshCaptcha() {
            const captchaImage = document.getElementById('captchaImage');
            const timestamp = new Date().getTime();
            captchaImage.src = '/api/captcha?t=' + timestamp;
            // 清除验证码输入框
            document.getElementById('captcha').value = '';
            // 隐藏错误信息
            document.getElementById('captchaError').style.display = 'none';
        }

        function handleLogin(event) {
            event.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const captcha = document.getElementById('captcha').value;
            const captchaError = document.getElementById('captchaError');

            if (!captcha) {
                captchaError.textContent = '请输入验证码';
                captchaError.style.display = 'block';
                return false;
            }

            // 发送登录请求
            fetch('/api/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    username: username,
                    password: password,
                    captcha: captcha
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    Swal.fire({
                        title: '登录成功',
                        text: '正在跳转...',
                        icon: 'success',
                        timer: 1500,
                        showConfirmButton: false
                    }).then(() => {
                        window.location.href = '/index';
                    });
                } else {
                    if (data.error === 'captcha') {
                        captchaError.textContent = data.message || '验证码错误';
                        captchaError.style.display = 'block';
                        refreshCaptcha();
                    } else {
                        Swal.fire({
                            title: '错误',
                            text: data.message || '登录失败',
                            icon: 'error',
                            confirmButtonText: '确定',
                            confirmButtonColor: '#007bff'
                        });
                    }
                }
            })
            .catch(error => {
                console.error('Error:', error);
                Swal.fire({
                    title: '错误',
                    text: '服务器错误，请稍后重试',
                    icon: 'error',
                    confirmButtonText: '确定',
                    confirmButtonColor: '#007bff'
                });
            });

            return false;
        }

        // 页面加载完成后刷新验证码
        document.addEventListener('DOMContentLoaded', function() {
            refreshCaptcha();
        });
    </script>
</body>
</html>
